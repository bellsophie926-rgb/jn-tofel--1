    &lt;style&gt;
        :root {
            --primary: #00467f;
            --secondary: #f4f4f4;
            --accent: #ffcc00;
            --text: #333;
            --success: #28a745;
            --error: #dc3545;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--secondary);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .header-right { display: flex; align-items: center; gap: 15px; }

        /* Tabs for Passages */
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 0 20px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: bold;
            white-space: nowrap;
            color: #666;
        }
        .tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
        }
        .tab.completed { color: var(--success); }

        /* Layout Container */
        .layout-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left: Passage */
        .passage-section {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #fff;
            border-right: 1px solid #ddd;
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .passage-section h2 { color: var(--primary); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* Right: Questions */
        .question-section {
            width: 480px;
            background: var(--secondary);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .question-box {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: none;
        }
        .question-box.active { display: block; }

        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .option {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option:hover { background: #f0f7ff; border-color: var(--primary); }
        .option.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .option.wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }
        
        .feedback { margin-top: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 4px; background: #f9f9f9; }
        .feedback.show { display: block; }

        /* Footer */
        footer {
            background: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }
        button {
            padding: 10px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Overlays */
        #login-overlay, #result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 450px; text-align: center; }
        .login-card input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        #result-overlay { background: rgba(255,255,255,0.98); display: none; flex-direction: column; color: var(--text); z-index: 2000; }
        .score-num { font-size: 4rem; color: var(--primary); font-weight: bold; }
        .code-box { background: #f4f4f4; padding: 20px; border: 1px dashed #999; margin: 20px; font-family: monospace; font-size: 1.2rem; }
    &lt;/style&gt;

                    { id: 20, options: [&quot;basing&quot;, &quot;base&quot;, &quot;based&quot;, &quot;is based&quot;], correct: 2 },
                    { id: 21, options: [&quot;how use different tools&quot;, &quot;how to use different tools&quot;, &quot;use how different tools&quot;, &quot;using how different tools&quot;], correct: 1 },

            {
                id: 6, title: &quot;Magazine Article&quot;,
                text: `Sometimes I really do impress myself with my ability &lt;strong&gt;(26) ______&lt;/strong&gt; by life. It seems &lt;strong&gt;(27) ______&lt;/strong&gt; some things have never happened to me or I am an alien from some other distant planet. &quot;Human beings&quot; surprise me, make me cry, make me laugh and make me happy. That Saturday morning, my &quot;alien being&quot; went out the house &lt;strong&gt;(28) ______&lt;/strong&gt; deserted paths, beautiful trees, the smell of grass, the sounds of the sleepy city and something that would make me smile. Autumn was already in the air and I &lt;strong&gt;(29) ______&lt;/strong&gt; about how cruel the world was and how impossible it was to be happy in it. It is not &lt;strong&gt;(30) ______&lt;/strong&gt; I was broken hearted by the thought that my patience has come to its end. I looked at the blue sky and sat at a bench. I was sitting there and thinking about how I want to be another person. &lt;strong&gt;(31) ______&lt;/strong&gt;, I realized that my main problem was that I felt that I could not overcome all the &quot;love&quot; obstacles that life made me face. I recalled everything I had read in books about love &lt;strong&gt;(32) ______&lt;/strong&gt; everything that I had experienced myself. In the books everything seemed to be smoother and easier. My main thought was &quot;how people can possibly spend their whole life together?&quot; A small rain started and made me feel &lt;strong&gt;(33) ______&lt;/strong&gt; more stupid.`,

                    { id: 27, options: [&quot;love&quot;, &quot;like&quot;, &quot;prefer&quot;, &quot;enjoy&quot;], correct: 1 },

                    { id: 29, options: [&quot;am thinking&quot;, &quot;have thought&quot;, &quot;was thinking&quot;, &quot;had thought&quot;], correct: 2 },
                    { id: 30, options: [&quot;which&quot;, &quot;who&quot;, &quot;how&quot;, &quot;that&quot;], correct: 3 },
                    { id: 31, options: [&quot;First of all&quot;, &quot;However&quot;, &quot;Eventually&quot;, &quot;Nevertheless&quot;], correct: 2 },
                    { id: 32, options: [&quot;with&quot;, &quot;as well as&quot;, &quot;as well&quot;, &quot;also&quot;], correct: 1 },

            {
                id: 7, title: &quot;Chinese Language&quot;,
                text: `In this part of my paper I want to &lt;strong&gt;(34) ______&lt;/strong&gt; your attention to some surprising facts that pertain to the Chinese language. The research shows that the Chinese language has a relatively uncomplicated grammar. &lt;strong&gt;(35) ______&lt;/strong&gt; French, German or English, Chinese has no verb conjugation (in other words tense inflection). Also, this language has no noun declension, including gender and number distinctions. &lt;strong&gt;(36) ______&lt;/strong&gt; Chinese you do not have to memorize different verb forms of &quot;see/saw/seen.&quot; &lt;strong&gt;(37) ______&lt;/strong&gt; you have to remember is just one word: kan. The basic word order of Chinese is the verb-object. The object exists just in the same form as it exists in English. The research proves that there are quite a number of key terms. These are &lt;strong&gt;(38) ______&lt;/strong&gt; with Mandarin Chinese. These &lt;strong&gt;(39) ______&lt;/strong&gt; in the course of translations of key English concepts. &lt;strong&gt;(40) ______&lt;/strong&gt; you have to remember the following facts: Currently Mandarin Chinese is spoken by over 1 billion people around the world which constitutes about one fifth of the global population. Many students who are eager to familiarize themselves with the other cultures are learning Mandarin. &lt;strong&gt;(41) ______&lt;/strong&gt; comparatively easy, the language is studied with much enthusiasm and success. The study of Chinese literature can be used to bridge the cultural gap that can help humans understand their Chinese counterparts, &lt;strong&gt;(42) ______&lt;/strong&gt; creating a platform that would sustain knowledge and understanding.`,
                questions: [
                    { id: 34, options: [&quot;pay&quot;, &quot;use&quot;, &quot;notice&quot;, &quot;draw&quot;], correct: 3 },
                    { id: 35, options: [&quot;Instead of&quot;, &quot;Including&quot;, &quot;Except for&quot;, &quot;Contrary to&quot;], correct: 3 },
                    { id: 36, options: [&quot;While to learn&quot;, &quot;While learnt&quot;, &quot;While learning&quot;, &quot;While learned&quot;], correct: 2 },
                    { id: 37, options: [&quot;all&quot;, &quot;which&quot;, &quot;that&quot;, &quot;what&quot;], correct: 3 },
                    { id: 38, options: [&quot;concerned&quot;, &quot;worried&quot;, &quot;weird&quot;, &quot;cared&quot;], correct: 0 },
                    { id: 39, options: [&quot;form&quot;, &quot;formed&quot;, &quot;had formed&quot;, &quot;have been formed&quot;], correct: 3 },
                    { id: 40, options: [&quot;By the way&quot;, &quot;In this case&quot;, &quot;In case&quot;, &quot;Except that&quot;], correct: 1 },

        let studentName = &quot;&quot;;
        let currentPassageIdx = 0;
        let currentQuestionInPassageIdx = 0;
        let answers = []; 
        let sdk = null;

        function startTest() {
            const nameInput = document.getElementById('student-name').value.trim();
            if (!nameInput) return alert(&quot;Please enter your name&quot;);
            
            studentName = nameInput;
            document.getElementById('display-name').innerText = studentName;
            document.getElementById('login-overlay').style.display = 'none';
            
            answers = passages.map(p =&gt; Array(p.questions.length).fill(null));
            sdk = new MuskCollect();
            renderTabs();
            updateDisplay();
            startTimer();
        }

        function renderTabs() {
            const container = document.getElementById('passage-tabs');
            container.innerHTML = passages.map((p, idx) =&gt; `
                &lt;div class=&quot;tab ${idx === currentPassageIdx ? 'active' : ''}&quot; onclick=&quot;switchPassage(${idx})&quot;&gt;
                    Text ${idx + 1}
                &lt;/div&gt;
            `).join('');
        }

        function switchPassage(idx) {
            currentPassageIdx = idx;
            currentQuestionInPassageIdx = 0;
            renderTabs();
            updateDisplay();
        }

        function updateDisplay() {
            const p = passages[currentPassageIdx];
            document.getElementById('passage-title').innerText = p.title;
            document.getElementById('passage-content').innerHTML = p.text;
            renderQuestion();
            updateNav();
        }

        function renderQuestion() {
            const pIdx = currentPassageIdx;
            const qIdx = currentQuestionInPassageIdx;
            const q = passages[pIdx].questions[qIdx];
            const container = document.getElementById('questions-container');
            
            let globalNum = 0;
            for(let i=0; i&lt;pIdx; i++) globalNum += passages[i].questions.length;
            globalNum += (qIdx + 1);

            container.innerHTML = `
                &lt;div class=&quot;question-box active&quot;&gt;
                    &lt;div style=&quot;font-weight:bold; color:var(--primary); margin-bottom:12px;&quot;&gt;Question ${globalNum} / 42&lt;/div&gt;
                    &lt;div class=&quot;options&quot;&gt;
                        ${q.options.map((opt, optIdx) =&gt; {
                            let className = &quot;option&quot;;
                            const userAns = answers[pIdx][qIdx];
                            if (userAns !== null) {
                                if (optIdx === q.correct) className += &quot; correct&quot;;
                                else if (optIdx === userAns) className += &quot; wrong&quot;;
                            }
                            return `
                                &lt;div class=&quot;${className}&quot; onclick=&quot;handleAnswer(${pIdx}, ${qIdx}, ${optIdx})&quot;&gt;
                                    &lt;strong&gt;${String.fromCharCode(65 + optIdx)}&lt;/strong&gt; ${opt}
                                &lt;/div&gt;
                            `;
                        }).join('')}
                    &lt;/div&gt;
                    &lt;div class=&quot;feedback ${answers[pIdx][qIdx] !== null ? 'show' : ''}&quot;&gt;
                        ${answers[pIdx][qIdx] !== null ? 
                            (answers[pIdx][qIdx] === q.correct ? 
                                '&lt;span style=&quot;color:var(--success)&quot;&gt;✓ Correct!&lt;/span&gt;' : 
                                `&lt;span style=&quot;color:var(--error)&quot;&gt;✗ Incorrect. Answer: (${String.fromCharCode(65 + q.correct)})&lt;/span&gt;`) 
                            : ''}
                    &lt;/div&gt;
                &lt;/div&gt;
            `;
            document.getElementById('current-display-idx').innerText = globalNum;
        }

        function handleAnswer(pIdx, qIdx, optIdx) {
            if (answers[pIdx][qIdx] !== null) return;
            answers[pIdx][qIdx] = optIdx;
            renderQuestion();
            checkProgress();
        }

        function updateNav() {
            const isFirst = (currentPassageIdx === 0 &amp;&amp; currentQuestionInPassageIdx === 0);
            const isLast = (currentPassageIdx === passages.length - 1 &amp;&amp; currentQuestionInPassageIdx === passages[currentPassageIdx].questions.length - 1);
            
            document.getElementById('prev-btn').disabled = isFirst;
            document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = isLast ? 'block' : 'none';
        }

        function goPrev() {
            if (currentQuestionInPassageIdx &gt; 0) {
                currentQuestionInPassageIdx--;
            } else if (currentPassageIdx &gt; 0) {
                currentPassageIdx--;
                currentQuestionInPassageIdx = passages[currentPassageIdx].questions.length - 1;
                renderTabs();
            }
            updateDisplay();
        }

        function goNext() {
            if (currentQuestionInPassageIdx &lt; passages[currentPassageIdx].questions.length - 1) {
                currentQuestionInPassageIdx++;
            } else if (currentPassageIdx &lt; passages.length - 1) {
                currentPassageIdx++;
                currentQuestionInPassageIdx = 0;
                renderTabs();
            }
            updateDisplay();
        }

        function checkProgress() {
            let totalAnswered = 0;
            answers.forEach(p =&gt; totalAnswered += p.filter(a =&gt; a !== null).length);
            if (totalAnswered === 42) {
                document.getElementById('submit-btn').disabled = false;
            }
        }

        async function finishTest() {
            let correct = 0;
            const details = [];
            passages.forEach((p, pIdx) =&gt; {
                p.questions.forEach((q, qIdx) =&gt; {
                    const ans = answers[pIdx][qIdx];
                    if (ans === q.correct) correct++;
                    details.push({
                        qId: q.id,
                        answer: q.options[ans],
                        isCorrect: ans === q.correct
                    });
                });
            });

            const submissionCode = 'TJ-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            if (sdk) {
                await sdk.save('toefl_results', {
                    studentName, score: `${correct}/42`, correctCount: correct, totalQuestions: 42, code: submissionCode, details
                });
            }

            document.getElementById('final-score').innerText = correct;
            document.getElementById('submission-code').innerText = submissionCode;
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('submission-code').innerText).then(() =&gt; alert(&quot;Copied!&quot;));
        }

        function startTimer() {
            let timeLeft = 25 * 60;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() =&gt; {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerEl.innerText = `${mins}:${secs &lt; 10 ? '0' : ''}${secs}`;
                if (timeLeft &lt;= 0) { clearInterval(interval); finishTest(); }
                timeLeft--;
            }, 1000);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
